<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday 💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 2s ease;
      max-width: 350px;
    }

    h1 { font-size: 2.2em; }
    p { font-size: 1.1em; color: #555; }

    .heart {
      font-size: 2em;
      animation: heartbeat 1.5s infinite;
    }

    .btn {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      background: #ff6f91;
      color: white;
      cursor: pointer;
    }

    .hidden-message { display: none; margin-top: 10px; }

    .slideshow img {
      width: 100%;
      border-radius: 15px;
      margin-top: 10px;
    }

    .balloon {
      position: absolute;
      bottom: -100px;
      font-size: 2rem;
      animation: floatUp 6s linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-110vh); opacity: 0; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }
  </style>
</head>
<body>

<!-- Background Music -->
<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<!-- Floating Balloons -->
<div class="balloon" style="left:10%">🎈</div>
<div class="balloon" style="left:30%">🎈</div>
<div class="balloon" style="left:50%">🎈</div>
<div class="balloon" style="left:70%">🎈</div>
<div class="balloon" style="left:90%">🎈</div>

<div class="card">
  <h1 id="typing"></h1>
  <p>To an amazing friend 💫</p>
  <div class="heart">❤️</div>

  <p>Wishing you a day filled with happiness, laughter, and everything you love 🎂</p>

  <!-- Slideshow -->
  <<img src="aiman.jpg" style="width:100%; border-radius:15px;">">
  </div>

  <button class="btn" onclick="showMessage()">Click for a Surprise 🎁</button>
  <p class="hidden-message" id="secret">You are a wonderful friend, and I'm lucky to know you 🤝</p>
</div>

<script>
  function showMessage() {
    document.getElementById('secret').style.display = 'block';
  }

  <img src="aiman.jpg" style="width:100%; border-radius:15px;">

  // Typing animation
  const text = "Happy Birthday, Sayyed Aiman 🎉";
  let i = 0;
  function typeEffect() {
    if (i < text.length) {
      document.getElementById("typing").innerHTML += text.charAt(i);
      i++;
      setTimeout(typeEffect, 80);
    }
  }
  window.onload = typeEffect;
</script>

</body>
</html>
